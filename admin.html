<!DOCTYPE html>
<html lang="cs" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<meta name="google" content="notranslate">
<meta http-equiv="Content-Language" content="cs">
<title>Admin — CakeMe</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#c9a96e;--gold-l:#e8d5a3;--gold-d:#9a7a4a;
  --bg0:#0a0a0a;--bg1:#111;--bg2:#161616;--bg3:#1c1c1c;
  --tx0:#f5f0e8;--tx1:#c8b898;--tx2:#777;
  --bdr:#242424;
}
html,body{height:100%}
body{font-family:'Raleway',sans-serif;background:var(--bg0);color:var(--tx0)}

/* ── LOGIN ── */
#loginScreen{
  display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;
  background-color:var(--bg0);
  background-image:radial-gradient(ellipse 80% 55% at 50% 30%,rgba(201,169,110,.07) 0%,transparent 65%),
    linear-gradient(rgba(201,169,110,.02) 1px,transparent 1px),
    linear-gradient(90deg,rgba(201,169,110,.02) 1px,transparent 1px);
  background-size:100% 100%,55px 55px,55px 55px;
}
.login-box{background:var(--bg2);border:1px solid var(--bdr);padding:52px 44px;text-align:center;width:100%;max-width:360px}
.login-crown{margin-bottom:22px}
.login-title{font-family:'Playfair Display',serif;font-size:1.75rem;color:var(--gold);letter-spacing:1.5px;margin-bottom:6px}
.login-sub{font-size:.68rem;color:var(--tx2);letter-spacing:3px;text-transform:uppercase;margin-bottom:36px;display:block}
.login-input{width:100%;background:var(--bg3);border:1px solid var(--bdr);color:var(--tx0);padding:13px 16px;font:1rem 'Raleway',sans-serif;outline:none;transition:.25s;text-align:center;letter-spacing:4px}
.login-input:focus{border-color:var(--gold)}
.login-btn{width:100%;margin-top:14px;background:var(--gold);color:var(--bg0);border:none;padding:13px;font:.8rem 'Raleway',sans-serif;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:.25s}
.login-btn:hover{background:var(--gold-l)}
.login-err{color:#e08080;font-size:.8rem;margin-top:12px;min-height:20px}

/* ── PANEL ── */
#adminPanel{display:none;min-height:100vh;flex-direction:column}

/* Header */
.adm-hdr{background:rgba(10,10,10,.98);border-bottom:1px solid var(--bdr);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.adm-logo{display:flex;align-items:center;gap:10px}
.adm-logo-txt{font-family:'Playfair Display',serif;color:var(--gold);font-size:1rem;letter-spacing:1.5px;line-height:1.3}
.adm-logo-sub{font-size:.6rem;color:var(--tx2);letter-spacing:2.5px;text-transform:uppercase;font-family:'Raleway',sans-serif;display:block}
.adm-hdr-right{display:flex;align-items:center;gap:10px}
.adm-btn{background:transparent;border:1px solid var(--bdr);color:var(--tx2);padding:7px 14px;cursor:pointer;font:.7rem 'Raleway',sans-serif;letter-spacing:1px;text-transform:uppercase;transition:.25s}
.adm-btn:hover{border-color:var(--gold);color:var(--gold)}
.adm-btn.danger:hover{border-color:#e08080;color:#e08080}

/* Main nav */
.adm-main-nav{display:flex;border-bottom:2px solid var(--bdr);background:var(--bg1)}
.amn{flex:1;background:transparent;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--tx2);padding:16px 20px;cursor:pointer;font:.78rem 'Raleway',sans-serif;letter-spacing:2px;text-transform:uppercase;transition:.25s;display:flex;align-items:center;justify-content:center;gap:8px}
.amn:hover{color:var(--tx0)}
.amn.on{color:var(--gold);border-bottom-color:var(--gold)}
.amn-ic{font-size:1.1rem}

/* ── ORDERS SECTION ── */
.adm-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--bdr);border-bottom:1px solid var(--bdr)}
.stat-box{background:var(--bg2);padding:22px 20px;text-align:center}
.stat-val{font-family:'Playfair Display',serif;font-size:2.4rem;color:var(--gold);display:block;line-height:1}
.stat-lbl{font-size:.68rem;color:var(--tx2);letter-spacing:2px;text-transform:uppercase;margin-top:7px;display:block}
.adm-filters{display:flex;border-bottom:1px solid var(--bdr);background:var(--bg1);overflow-x:auto}
.adm-filter{background:transparent;border:none;border-right:1px solid var(--bdr);color:var(--tx2);padding:13px 20px;cursor:pointer;font:.72rem 'Raleway',sans-serif;letter-spacing:1.5px;text-transform:uppercase;transition:.25s;display:flex;align-items:center;gap:8px;white-space:nowrap;flex-shrink:0;border-bottom:2px solid transparent}
.adm-filter:hover{color:var(--tx0)}
.adm-filter.on{color:var(--gold);border-bottom-color:var(--gold)}
.f-cnt{background:var(--bg3);border:1px solid var(--bdr);border-radius:10px;font-size:.62rem;padding:1px 7px;min-width:20px;text-align:center;font-weight:600}
.adm-filter.on .f-cnt{background:rgba(201,169,110,.15);border-color:var(--gold-d);color:var(--gold)}
.adm-body{flex:1;padding:24px 28px;max-width:960px;width:100%;margin:0 auto}
.adm-top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.adm-count{font-size:.78rem;color:var(--tx2)}
.btn-clear{background:transparent;border:1px solid var(--bdr);color:var(--tx2);padding:7px 14px;cursor:pointer;font:.7rem 'Raleway',sans-serif;letter-spacing:1px;text-transform:uppercase;transition:.25s}
.btn-clear:hover{border-color:#e08080;color:#e08080}

/* Order cards */
.order-card{background:var(--bg2);border:1px solid var(--bdr);margin-bottom:12px;transition:.25s}
.order-card.new{border-left:3px solid var(--gold)}
.order-card.in_progress{border-left:3px solid #5a8fc5}
.order-card.done{opacity:.55}
.order-card.done:hover{opacity:.75}
.oc-head{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--bdr);background:var(--bg3)}
.oc-time{font-size:.76rem;color:var(--tx2)}
.oc-type{font-size:.7rem;color:var(--tx1);margin-top:2px}
.oc-status-badge{font-size:.66rem;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;padding:4px 10px}
.badge-new{background:rgba(201,169,110,.15);color:var(--gold)}
.badge-in_progress{background:rgba(90,143,197,.15);color:#7aabd4}
.badge-done{background:rgba(74,122,74,.15);color:#88cc88}
.oc-body{padding:14px 18px;display:grid;grid-template-columns:1fr 1fr;gap:10px 20px}
.oc-field{display:flex;flex-direction:column;gap:3px}
.oc-field.full{grid-column:1/-1}
.oc-lbl{font-size:.63rem;letter-spacing:1.8px;text-transform:uppercase;color:var(--tx2);font-weight:600}
.oc-val{font-size:.85rem;color:var(--tx0);line-height:1.5}
.oc-val a{color:var(--gold);text-decoration:none;transition:.2s}
.oc-val a:hover{color:var(--gold-l)}
.oc-val.items{color:var(--tx1);font-size:.82rem;line-height:1.65}
.oc-actions{padding:10px 18px;border-top:1px solid var(--bdr);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.oc-actions button{background:transparent;border:1px solid var(--bdr);color:var(--tx2);padding:5px 13px;cursor:pointer;font:.67rem 'Raleway',sans-serif;letter-spacing:1px;text-transform:uppercase;transition:.2s}
.oc-actions button:hover{border-color:var(--gold);color:var(--gold)}
.btn-done:hover{border-color:#88cc88!important;color:#88cc88!important}
.btn-del{margin-left:auto!important;border-color:transparent!important}
.btn-del:hover{border-color:#e08080!important;color:#e08080!important}
.no-orders{text-align:center;color:var(--tx2);padding:56px;font-size:.88rem}

/* ── MENU SECTION ── */
.menu-admin-body{padding:28px;max-width:960px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:28px;align-items:start}
.menu-panel{background:var(--bg2);border:1px solid var(--bdr);padding:24px}
.menu-panel h3{font-family:'Playfair Display',serif;font-size:1.15rem;color:var(--tx0);margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--bdr)}
.mai-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.mai-field{display:flex;flex-direction:column;gap:6px}
.mai-field.full{grid-column:1/-1}
.mai-field label{font-size:.68rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx1);font-weight:600}
.mai-field input,.mai-field select{background:var(--bg3);border:1px solid var(--bdr);color:var(--tx0);padding:10px 12px;font:.85rem 'Raleway',sans-serif;outline:none;transition:.25s;width:100%}
.mai-field input:focus,.mai-field select:focus{border-color:var(--gold)}
.mai-field select option{background:var(--bg2)}
.btn-add-item{width:100%;background:var(--gold);color:var(--bg0);border:none;padding:12px;font:.76rem 'Raleway',sans-serif;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:.25s;margin-bottom:10px}
.btn-add-item:hover{background:var(--gold-l)}
.btn-add-item:disabled{opacity:.6;cursor:default}
.add-msg{text-align:center;font-size:.8rem;min-height:20px;padding:6px}
.add-msg.ok{color:#88cc88}
.add-msg.err{color:#e08080}
.ci-card{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--bdr)}
.ci-card:last-child{border-bottom:none}
.ci-thumb{width:48px;height:48px;object-fit:cover;flex-shrink:0;background:var(--bg3)}
.ci-no-img{width:48px;height:48px;background:var(--bg3);display:flex;align-items:center;justify-content:center;color:var(--tx2);font-size:1.4rem;flex-shrink:0}
.ci-info{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
.ci-name{font-size:.88rem;color:var(--tx0);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-meta{font-size:.72rem;color:var(--tx2);margin-top:2px}
.ci-del{background:transparent;border:1px solid transparent;color:var(--tx2);width:30px;height:30px;cursor:pointer;font-size:.9rem;transition:.2s;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.ci-del:hover{border-color:#e08080;color:#e08080}
.no-custom{color:var(--tx2);font-size:.84rem;padding:20px 0;text-align:center}
.ci-list-wrap{max-height:460px;overflow-y:auto}
.menu-actions{display:flex;gap:10px;margin-bottom:14px}
.btn-export{background:transparent;border:1px solid var(--bdr);color:var(--tx2);padding:7px 14px;cursor:pointer;font:.7rem 'Raleway',sans-serif;letter-spacing:1px;text-transform:uppercase;transition:.25s}
.btn-export:hover{border-color:var(--gold);color:var(--gold)}
.adm-langs{display:flex;gap:4px;align-items:center}
.adm-lang{background:transparent;border:1px solid var(--bdr);color:var(--tx2);padding:5px 10px;cursor:pointer;font:.68rem 'Raleway',sans-serif;font-weight:600;letter-spacing:.5px;transition:.2s;border-radius:2px}
.adm-lang:hover,.adm-lang.on{border-color:var(--gold);color:var(--gold);background:rgba(201,169,110,.1)}

/* ── IMAGE UPLOAD ── */
.img-upload-zone{border:2px dashed var(--bdr);padding:28px 16px;text-align:center;cursor:pointer;transition:.25s;background:var(--bg3)}
.img-upload-zone:hover,.img-upload-zone.over{border-color:var(--gold);background:rgba(201,169,110,.05)}
.img-upload-ico{font-size:2rem;margin-bottom:8px;display:block}
.img-upload-lbl{font-size:.76rem;color:var(--tx1);letter-spacing:.3px}
.img-upload-sub{font-size:.63rem;color:var(--tx2);margin-top:6px}
.img-upload-preview{width:100%;height:170px;object-fit:cover;display:none;border:1px solid var(--bdr);margin-top:8px}
.img-reset-btn{display:none;width:100%;margin-top:6px;background:transparent;border:1px solid var(--bdr);color:var(--tx2);padding:6px;font:.65rem 'Raleway',sans-serif;cursor:pointer;transition:.2s;letter-spacing:.5px}
.img-reset-btn:hover{border-color:#e08080;color:#e08080}

/* ── CARD PREVIEW ── */
.card-prev-wrap{margin-top:20px;padding-top:16px;border-top:1px solid var(--bdr)}
.card-prev-lbl{font-size:.63rem;letter-spacing:2px;text-transform:uppercase;color:var(--tx2);margin-bottom:12px;display:block}
.card-prev{background:var(--bg1);border:1px solid var(--bdr);overflow:hidden;max-width:260px;margin:0 auto}
.cp-img-box{width:100%;height:148px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:2.4rem;position:relative;overflow:hidden}
.cp-img-box img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;display:none}
.cp-body{padding:14px}
.cp-badge{display:none;background:var(--gold);color:var(--bg0);font:.58rem 'Raleway',sans-serif;letter-spacing:1.5px;text-transform:uppercase;padding:3px 8px;font-weight:700;margin-bottom:8px}
.cp-name{font-family:'Playfair Display',serif;font-size:.98rem;color:var(--tx0);margin-bottom:5px}
.cp-desc{font-size:.72rem;color:var(--tx2);line-height:1.55;margin-bottom:12px;min-height:20px}
.cp-ft{display:flex;align-items:center;justify-content:space-between}
.cp-price{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--gold)}
.cp-btn-fake{background:transparent;border:1px solid rgba(201,169,110,.4);color:var(--gold);padding:5px 12px;font:.62rem 'Raleway',sans-serif;letter-spacing:1px;text-transform:uppercase}

@media(max-width:860px){
  .menu-admin-body{grid-template-columns:1fr;padding:16px}
  .adm-stats{grid-template-columns:repeat(3,1fr)}
  .stat-val{font-size:1.7rem}
  .oc-body{grid-template-columns:1fr}
  .adm-body{padding:14px}
  .adm-hdr{padding:12px 16px}
  .login-box{padding:36px 22px}
  .mai-grid{grid-template-columns:1fr}
}
@media(max-width:560px){
  .adm-stats{grid-template-columns:repeat(3,1fr);gap:1px}
  .stat-val{font-size:1.4rem}
  .stat-lbl{font-size:.6rem;letter-spacing:1px}
  .stat-box{padding:16px 10px}
  .adm-main-nav{overflow-x:auto}
  .amn{font-size:.68rem;padding:14px 12px;white-space:nowrap}
  .oc-head{flex-direction:column;gap:6px;align-items:flex-start}
  .oc-actions{gap:6px}
  .oc-actions button{font-size:.62rem;padding:4px 10px}
  .login-box{padding:28px 16px}
}
</style>
</head>
<body translate="no">

<!-- ── LOGIN ── -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-crown">
      <svg width="54" height="54" viewBox="0 0 36 36" fill="none">
        <path d="M4 28 L4 18 L10 23 L15 13 L18 7 L21 13 L26 23 L32 18 L32 28 Z" stroke="#c9a96e" stroke-width="1.4" stroke-linejoin="round" fill="none"/>
        <circle cx="18" cy="7" r="1.6" fill="#c9a96e"/>
        <circle cx="15" cy="13" r="1.3" fill="#c9a96e"/>
        <circle cx="21" cy="13" r="1.3" fill="#c9a96e"/>
        <circle cx="4"  cy="18" r="1.3" fill="#c9a96e"/>
        <circle cx="32" cy="18" r="1.3" fill="#c9a96e"/>
      </svg>
    </div>
    <h1 class="login-title">CakeMe</h1>
    <span class="login-sub" data-k="adm_panel">Admin Panel</span>
    <input type="password" id="pwdInput" class="login-input" placeholder="••••••••" autocomplete="current-password">
    <button class="login-btn" id="loginBtn" data-k="adm_login">Přihlásit se</button>
    <p class="login-err" id="loginErr"></p>
  </div>
</div>

<!-- ── ADMIN PANEL ── -->
<div id="adminPanel">

  <header class="adm-hdr">
    <div class="adm-logo">
      <svg width="30" height="30" viewBox="0 0 36 36" fill="none">
        <path d="M4 28 L4 18 L10 23 L15 13 L18 7 L21 13 L26 23 L32 18 L32 28 Z" stroke="#c9a96e" stroke-width="1.4" stroke-linejoin="round" fill="none"/>
        <circle cx="18" cy="7" r="1.6" fill="#c9a96e"/>
        <circle cx="15" cy="13" r="1.3" fill="#c9a96e"/>
        <circle cx="21" cy="13" r="1.3" fill="#c9a96e"/>
        <circle cx="4"  cy="18" r="1.3" fill="#c9a96e"/>
        <circle cx="32" cy="18" r="1.3" fill="#c9a96e"/>
      </svg>
      <div class="adm-logo-txt">Cukrárna CakeMe<span class="adm-logo-sub">Admin panel</span></div>
    </div>
    <div class="adm-hdr-right">
      <div class="adm-langs">
        <button class="adm-lang on" data-al="cs">🇨🇿 CZ</button>
        <button class="adm-lang" data-al="uk">🇺🇦 UA</button>
      </div>
      <button class="adm-btn" id="refreshBtn" data-k="adm_refresh">↻ Obnovit</button>
      <button class="adm-btn danger" id="logoutBtn" data-k="adm_logout">Odhlásit</button>
    </div>
  </header>

  <!-- MAIN NAV -->
  <div class="adm-main-nav">
    <button class="amn on" data-sec="orders"><span class="amn-ic">📋</span> <span data-k="adm_orders">Objednávky</span></button>
    <button class="amn" data-sec="menu"><span class="amn-ic">🎂</span> <span data-k="adm_menu">Menu</span></button>
  </div>

  <!-- ── ORDERS ── -->
  <div id="secOrders">
    <div class="adm-stats">
      <div class="stat-box">
        <span class="stat-val" id="statNew">—</span>
        <span class="stat-lbl" data-k="adm_stat_new">Nové</span>
      </div>
      <div class="stat-box">
        <span class="stat-val" id="statToday">—</span>
        <span class="stat-lbl" data-k="adm_stat_today">Dnes</span>
      </div>
      <div class="stat-box">
        <span class="stat-val" id="statTotal">—</span>
        <span class="stat-lbl" data-k="adm_stat_total">Celkem</span>
      </div>
    </div>
    <div class="adm-filters">
      <button class="adm-filter on" data-filter="all"><span data-k="adm_filter_all">Vše</span> <span class="f-cnt" id="cntAll">0</span></button>
      <button class="adm-filter" data-filter="new"><span data-k="adm_filter_new">Nové</span> <span class="f-cnt" id="cntNew">0</span></button>
      <button class="adm-filter" data-filter="in_progress"><span data-k="adm_filter_prog">Přijaty</span> <span class="f-cnt" id="cntProg">0</span></button>
      <button class="adm-filter" data-filter="done"><span data-k="adm_filter_done">Hotové</span> <span class="f-cnt" id="cntDone">0</span></button>
    </div>
    <div class="adm-body">
      <div class="adm-top-bar">
        <span class="adm-count" id="orderCount"></span>
        <button class="btn-clear" id="clearDoneBtn" data-k="adm_clear_done">Smazat hotové</button>
      </div>
      <div id="ordersList"></div>
    </div>
  </div>

  <!-- ── MENU MANAGEMENT ── -->
  <div id="secMenu" style="display:none">
    <div class="menu-admin-body">

      <!-- Add form -->
      <div class="menu-panel">
        <h3 data-k="adm_add_title">Přidat položku do menu</h3>
        <div class="mai-grid">
          <div class="mai-field">
            <label data-k="adm_cat_lbl">Kategorie *</label>
            <select id="fCat">
              <option value="desserts" data-k="adm_cat_desserts">Dezerty</option>
              <option value="cakes" data-k="adm_cat_cakes">Dorty</option>
              <option value="drinks" data-k="adm_cat_drinks">Nápoje</option>
            </select>
          </div>
          <div class="mai-field">
            <label data-k="adm_price_lbl">Cena * (např. 133 Kč)</label>
            <input type="text" id="fPrice" placeholder="133 Kč">
          </div>
          <div class="mai-field">
            <label data-k="adm_name_cs_lbl">Název CZ *</label>
            <input type="text" id="fNameCs" placeholder="Název česky">
          </div>
          <div class="mai-field">
            <label data-k="adm_name_en_lbl">Name EN</label>
            <input type="text" id="fNameEn" placeholder="Name in English">
          </div>
          <div class="mai-field">
            <label data-k="adm_badge_lbl">Badge (Nové, Bestseller…)</label>
            <input type="text" id="fBadge" placeholder="">
          </div>
          <div class="mai-field full">
            <label data-k="adm_desc_cs_lbl">Popis CZ</label>
            <input type="text" id="fDescCs" placeholder="Krátký popis česky">
          </div>
          <div class="mai-field full">
            <label data-k="adm_desc_en_lbl">Description EN</label>
            <input type="text" id="fDescEn" placeholder="Short description in English">
          </div>
          <div class="mai-field full">
            <label data-k="adm_img_lbl">Obrázek</label>
            <input type="file" id="fImgFile" accept="image/*" style="display:none">
            <div class="img-upload-zone" id="uploadZone">
              <span class="img-upload-ico">🖼️</span>
              <div class="img-upload-lbl" data-k="adm_img_click">Klikněte nebo přetáhněte soubor</div>
              <div class="img-upload-sub" data-k="adm_img_hint">JPG, PNG, WebP · max 3 MB · automaticky zkomprimováno</div>
            </div>

function t(k, vars){
  let s = (TA[adminLang]||TA.cs)[k] || TA.cs[k] || k;
  if(vars) Object.keys(vars).forEach(v => s = s.replace('{'+v+'}', vars[v]));
  return s;
}

function applyAdminLang(){
  document.querySelectorAll('[data-k]').forEach(el => {

    if(val !== undefined) el.textContent = val;
  });

    btn.classList.toggle('on', btn.dataset.al === adminLang);
  });

  if(activeSection === 'menu' && cachedMenuItems !== null) renderMenuItems(cachedMenuItems);

/* ── Auth ── */
document.getElementById('loginBtn').addEventListener('click', tryLogin);
document.getElementById('pwdInput').addEventListener('keydown', e => { if(e.key==='Enter') tryLogin(); });

async function tryLogin(){
  const pwd = document.getElementById('pwdInput').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('loginErr');
  btn.disabled = true;
  try {
    const r = await fetch('/api/auth', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({pass: pwd})
    });
    const j = await r.json();
    if(r.ok && j.token){
      sessionStorage.setItem('cm_admin','1');
      sessionStorage.setItem('cm_token', j.token);
      showPanel();
    } else if(r.status === 429){
      err.textContent = t('adm_rate_limit');
    } else {
      err.textContent = t('adm_wrong_pwd');
      document.getElementById('pwdInput').value = '';
      document.getElementById('pwdInput').focus();
    }
  } catch {
    err.textContent = t('adm_login_err');
  }
  btn.disabled = false;
}

function showPanel(){
  document.getElementById('loginScreen').style.display = 'none';
  const p = document.getElementById('adminPanel');
  p.style.display = 'flex';
  p.style.flexDirection = 'column';
  applyAdminLang();
  renderOrders();
}

document.getElementById('logoutBtn').addEventListener('click', ()=>{
  sessionStorage.removeItem('cm_admin');
  sessionStorage.removeItem('cm_token');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('adminPanel').style.display = 'none';
  document.getElementById('pwdInput').value = '';

document.getElementById('clearDoneBtn').addEventListener('click', async ()=>{

    const tok = sessionStorage.getItem('cm_token')||'';
    await Promise.all(done.map(o=>fetch('/api/order/'+o.id,{
      method:'DELETE',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({token:tok})
    }).catch(()=>{})));
    renderOrders();
  }
});

function handleExpired(){
  sessionStorage.removeItem('cm_admin');
  sessionStorage.removeItem('cm_token');

  document.getElementById('loginScreen').style.display = 'flex';

/* ── Orders data ── */
async function loadOrders(){
  try{
    const r = await fetch('/api/orders',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({token:sessionStorage.getItem('cm_token')||''})
    });
    if(r.status === 401){ handleExpired(); return []; }
    if(!r.ok) throw new Error();
    ordersCache = await r.json();
  }catch{}
  return ordersCache;
}

async function setStatus(id, status){
  try{
    const r = await fetch('/api/order/'+id,{
      method:'PATCH',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({token:sessionStorage.getItem('cm_token')||'', status})
    });
    if(r.status === 401){ handleExpired(); return; }
  }catch{}
  renderOrders();
}

async function deleteOrder(id){
  if(!confirm(t('adm_del_order'))) return;
  try{
    const r = await fetch('/api/order/'+id,{
      method:'DELETE',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({token:sessionStorage.getItem('cm_token')||''})
    });
    if(r.status === 401){ handleExpired(); return; }
  }catch{}
  renderOrders();
}

/* ── Orders render ── */
function fmtTime(ts){
  const d = new Date(ts);
  return d.toLocaleDateString('cs-CZ',{day:'2-digit',month:'2-digit',year:'numeric'})
       + ' ' + d.toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'});
}

function statusLbl(s){ return {new:t('adm_s_new'), in_progress:t('adm_s_progress'), done:t('adm_s_done')}[s]||s; }

async function renderOrders(){
  const all = await loadOrders();
  const today = new Date().toDateString();
  const newO   = all.filter(o=>o.status==='new');
  const progO  = all.filter(o=>o.status==='in_progress');
  const doneO  = all.filter(o=>o.status==='done');
  const todayO = all.filter(o=>new Date(o.ts).toDateString()===today);

  document.getElementById('statNew').textContent   = newO.length;
  document.getElementById('statToday').textContent = todayO.length;
  document.getElementById('statTotal').textContent = all.length;
  document.getElementById('cntAll').textContent    = all.length;
  document.getElementById('cntNew').textContent    = newO.length;
  document.getElementById('cntProg').textContent   = progO.length;
  document.getElementById('cntDone').textContent   = doneO.length;

  let list = all;
  if(activeFilter==='new')              list = newO;
  else if(activeFilter==='in_progress') list = progO;
  else if(activeFilter==='done')        list = doneO;

  document.getElementById('orderCount').textContent = t('adm_count', {n: list.length});

  const el = document.getElementById('ordersList');
  if(!list.length){ el.innerHTML=`<div class="no-orders">${t('adm_no_orders')}</div>`; return; }

  el.innerHTML = list.map(o=>`
    <div class="order-card ${o.status}">
      <div class="oc-head">
        <div>
          <div class="oc-time">${fmtTime(o.ts)}</div>
          ${o.order_type?`<div class="oc-type">${esc(o.order_type)}</div>`:''}
        </div>
        <span class="oc-status-badge badge-${o.status}">${statusLbl(o.status)}</span>
      </div>
      <div class="oc-body">
        <div class="oc-field"><span class="oc-lbl">${t('adm_f_name')}</span><span class="oc-val">${esc(o.name)}</span></div>
        <div class="oc-field"><span class="oc-lbl">${t('adm_f_phone')}</span><span class="oc-val"><a href="tel:${esc(o.phone)}">${esc(o.phone)}</a></span></div>
        ${o.address?`<div class="oc-field full"><span class="oc-lbl">${t('adm_f_address')}</span><span class="oc-val">${esc(o.address)}</span></div>`:''}
        <div class="oc-field full"><span class="oc-lbl">${t('adm_f_order')}</span><span class="oc-val items">${esc(o.order)}</span></div>
        <div class="oc-field"><span class="oc-lbl">${t('adm_f_payment')}</span><span class="oc-val">${esc(o.payment)}</span></div>
      </div>
      <div class="oc-actions">
        ${o.status!=='new'         ?`<button onclick="setStatus(${o.id},'new')">${t('adm_btn_new')}</button>`:''}
        ${o.status!=='in_progress' ?`<button onclick="setStatus(${o.id},'in_progress')">${t('adm_btn_progress')}</button>`:''}
        ${o.status!=='done'        ?`<button class="btn-done" onclick="setStatus(${o.id},'done')">${t('adm_btn_done')}</button>`:''}
        <button class="btn-del" onclick="deleteOrder(${o.id})">${t('adm_btn_delete')}</button>
      </div>
    </div>
  `).join('');
}

/* ── Image upload & card preview ── */
let currentImgData = '';

const uploadZone  = document.getElementById('uploadZone');
const fImgFile    = document.getElementById('fImgFile');
const imgPrev     = document.getElementById('imgUploadPreview');
const imgResetBtn = document.getElementById('imgResetBtn');

uploadZone.addEventListener('click', () => fImgFile.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault(); uploadZone.classList.remove('over');
  const f = e.dataTransfer.files[0];
  if(f && f.type.startsWith('image/')) loadImgFile(f);
});
fImgFile.addEventListener('change', function(){ if(this.files[0]) loadImgFile(this.files[0]); });
imgResetBtn.addEventListener('click', resetImg);

function loadImgFile(file){
  if(file.size > 3*1024*1024){ alert(t('adm_img_big')); return; }
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height, MAX = 900;
      if(w > MAX){ h = Math.round(h*MAX/w); w = MAX; }
      if(h > MAX){ w = Math.round(w*MAX/h); h = MAX; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      currentImgData = canvas.toDataURL('image/jpeg', 0.82);
      imgPrev.src = currentImgData;
      imgPrev.style.display = 'block';
      uploadZone.style.display = 'none';
      imgResetBtn.style.display = 'block';
      updateCardPreview();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function resetImg(){
  currentImgData = ''; fImgFile.value = '';
  imgPrev.style.display = 'none';
  imgResetBtn.style.display = 'none';
  uploadZone.style.display = '';
  updateCardPreview();
}

  document.getElementById('cpDesc').textContent  = desc;
  document.getElementById('cpPrice').textContent = price || '— Kč';
  const badgeEl = document.getElementById('cpBadge');
  badgeEl.textContent = badge;
  badgeEl.style.display = badge ? 'inline-block' : 'none';
  const cpImg = document.getElementById('cpImg');
  const cpPl  = document.getElementById('cpImgPlaceholder');
  if(currentImgData){ cpImg.src = currentImgData; cpImg.style.display = 'block'; cpPl.style.display = 'none'; }
  else { cpImg.style.display = 'none'; cpPl.style.display = ''; }
}

function showAddMsg(text, type){
  const el = document.getElementById('addMsg');
  el.className = 'add-msg ' + type;
  el.textContent = text;
  setTimeout(()=>{ el.textContent=''; el.className='add-msg'; }, 4000);
}

function esc(s){
  return String(s||'—').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
